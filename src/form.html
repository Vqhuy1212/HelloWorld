<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form cho vui</title>
</head>
<body>
    <form>
        Họ:<br>
        <input type="text" name="firstname"><br>
        Tên:<br>
        <input type="text" name="lastname"><br>
        Username:<br>
        <input type="text" name="username"><br>
        Password:<br>
        <input type="password" name="psw"><br>
        <input type="submit" value="Submit">
        <input type="reset"><br>
        Giới tính:<br>
        <input type="radio" name="gender" value="male">Nam<br>
        <input type="radio" name="gender" value="female">Nữ<br>
        <input type="radio" name="gender" value="other">Khác<br>
        Ngày sinh:<br>
        <input type="date" name="day"><br>
        Sở thích:<br>
        <select name="sport">
            <option value="Cầu lông">Cầu lông</option>
            <option value="Đá banh">Đá banh</option>
            <option value="Bóng rổ">Bóng rổ</option>
        </select>
        <br>
        Mục tiêu ngắn và dài hạn:<br>
        <textarea rows="8" col="80">
            Nhập
        </textarea>
    </form>
</body>
</html>
